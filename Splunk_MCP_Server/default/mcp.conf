# mcp.conf
# Configuration file for MCP (Model Context Protocol) server
# This file configures the MCP server settings for Splunk integration

[server]
# This stanza configures the MCP server settings

# Timeout in seconds for requests to Splunk
# This applies to all API calls made to the Splunk REST API
# Default: 60.0
timeout = 60.0

# Timeout in seconds for all Splunk AI Assistant API-backed tools
# This only applies to SAIA tools; other tools use timeout above
# Default: 200.0
saia_timeout = 200.0

# Maximum number of rows that can be returned in a single query
# This is a safety limit to prevent excessive resource usage
# Default: 1000
max_row_limit = 1000

# Default number of rows to return when no limit is specified
# This is used when tools don't specify a row_limit parameter
# Default: 100
default_row_limit = 100

# SSL verification behavior for requests to Splunk.
# Accepted values:
#   true     : Verify SSL certificates using system CAs (default)
#   false    : Disable verification (NOT recommended for production)
#   <path>   : Path to a custom CA bundle or self-signed certificate (PEM/CRT)
#   none     : Ignore this setting and fall back to PYTHONHTTPSVERIFY or default
# Examples:
#   ssl_verify = true
#   ssl_verify = false
#   ssl_verify = /opt/splunk/etc/auth/myCA.pem
# If not set or set to 'none', the application honors PYTHONHTTPSVERIFY env var, else defaults to true.
# ssl_verify = true

# Require incoming bearer tokens to be RSA encrypted using the server's public key.
# When enabled (true), any token that cannot be successfully decrypted will be rejected (HTTP 401).
# When disabled (false), plaintext tokens are accepted and decryption is attempted opportunistically.
# Default: true
require_encrypted_token = true

# Temporary migration window for legacy plaintext and prior-key tokens.
# 0 disables the compatibility window. Recommended to keep this time-boxed.
# Default: 180 days
legacy_token_grace_days = 180

# Maximum allowed lifetime for tokens minted by /services/mcp_token.
# Requests with expires_on beyond this value are rejected (fail closed).
# Default: 15552000 (180 days)
mcp_token_max_lifetime_seconds = 15552000

# Default lifetime used when /services/mcp_token is called without expires_on.
# Must be <= mcp_token_max_lifetime_seconds.
# Default: 15552000 (180 days)
mcp_token_default_lifetime_seconds = 15552000

# How often (in seconds) to reload RSA keys from secure storage.
# How often TokenCrypto refreshes cached encryption keys from KV Store.
# Ensures key rotations (including those performed by other nodes in a cluster)
# are picked up by long-running processes.
# Default: 300 (5 minutes)
token_key_reload_interval_seconds = 300

# Enforce strict JWT validation for incoming CUI assertions before token exchange.
# When enabled, CUI assertions must pass signature and claim checks before calling
# /oauth2/v1/token.
# Default: true
cui_enforce_jwt_validation = true


# Allowed JWT algorithms for CUI assertions.
# Default: RS256
cui_allowed_jwt_algs = RS256

# JSON dictionary mapping issuer => JWKS URL.
# If an issuer is not listed, the server uses {issuer}/oauth2/v1/keys.
# Example:
# cui_jwks_by_issuer = {"https://idbroker1.webex.com/idb":"https://idbroker1.webex.com/idb/oauth2/v1/keys"}
cui_jwks_by_issuer = {}

# Allowed clock skew (seconds) when validating exp.
# Default: 60
cui_jwt_clock_skew_seconds = 60

[rate_limits]
# This stanza configures the rate limits for the MCP server.
# Supports both global and per-tool limits. Values specify the maximum number
# of requests allowed per 60-second window.

# Global rate limit for tools/call (requests per 60-second window).
# Set to 0 to disable global tools/call limiting.
global = 600

# Optional global pre-auth request budget for /services/mcp (per 60-second window).
# Set to 0 to disable this pre-auth global admission cap.
admission_global = 0

# Per-authenticated identity request budget for admission controls (per 60-second window).
# Must be > 0 for MCP endpoint requests to be admitted.
tenant_authenticated = 240

# Per-source IP request budget for unauthenticated admission traffic (per 60-second window).
# Must be > 0 for MCP endpoint requests to be admitted.
tenant_unauthenticated = 60

# Open circuit after this many consecutive 5xx responses.
# Must be > 0 for MCP endpoint requests to be admitted.
circuit_breaker_failure_threshold = 20

# Circuit breaker cooldown duration in seconds.
# Must be > 0 for MCP endpoint requests to be admitted.
circuit_breaker_cooldown_seconds = 30
