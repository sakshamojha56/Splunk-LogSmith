# Expose KV Store collections as lookups so dashboard panels can read them via `| inputlookup`
# `| inputlookup` goes through the lookup machinery and respects collection-level sharing in metadata/default.meta.
# 'collection' should be defined in collections.conf. 'external_type' setting describes the external lookup type.

[mcp_tools_enabled]
external_type = kvstore
collection = mcp_tools_enabled
fields_list = _key, tool_id

[mcp_tools]
external_type = kvstore
collection = mcp_tools
fields_list = _key, name, description, category, version, author, tags, spl, arguments, examples, metadata
