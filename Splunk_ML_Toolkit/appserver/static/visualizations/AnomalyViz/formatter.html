<form class="splunk-formatter-section" section-label="General">
    <splunk-control-group label="Show 95% Prediction Interval" help="">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showConfInterval95" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Show 50% Prediction Interval" help="">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showConfInterval50" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Show Anomaly Region" help="">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showAnomalyRegion" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Show Zone Boundaries" help="">
        <splunk-radio-input name="{{VIZ_NAMESPACE}}.showZoneBoundaries" value="true">
            <option value="true">Yes</option>
            <option value="false">No</option>
        </splunk-radio-input>
    </splunk-control-group>

    <splunk-control-group label="Legend Position" help="">
        <splunk-select name="{{VIZ_NAMESPACE}}.legendAlign" value="bottom">
            <option value="bottom">Bottom</option>
            <option value="right">Right</option>
            <option value="left">Left</option>
            <option value="top">Top</option>
        </splunk-select>
    </splunk-control-group>

    <splunk-control-group label="Group By Filter" help="Enter filter as column=value pairs separated by commas">
        <splunk-text-input name="{{VIZ_NAMESPACE}}.groupByFilter" value=""></splunk-text-input>
    </splunk-control-group>
</form>
